<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 格式化工具</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f1f5f9;
      color: #334155;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .editor-container {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 768px) {
      .editor-container {
        flex-direction: column;
      }
    }

    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .editor-label {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    textarea {
      width: 100%;
      flex: 1;
      min-height: 150px;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #1e293b;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      padding: 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      padding: 15px;
      background-color: #ffffff;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    button {
      padding: 10px 20px;
      min-width: 105px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background-color: #3b82f6;
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: #2563eb;
    }

    .btn-secondary {
      background-color: #64748b;
      color: #ffffff;
    }

    .btn-secondary:hover {
      background-color: #475569;
    }

    .btn-copy {
      background-color: #22c55e;
      color: #ffffff;
    }

    .btn-copy:hover {
      background-color: #16a34a;
    }

    .option-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .options-wrapper {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-left: auto;
    }

    @media (max-width: 768px) {
      .options-wrapper {
        margin-left: 0;
        width: 100%;
        justify-content: space-between;
      }
    }

    label {
      font-size: 14px;
      color: #475569;
    }

    select {
      padding: 8px 12px;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      color: #334155;
      font-size: 14px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
    }

    .status-bar {
      padding: 12px 15px;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      min-height: 20px;
      color: #475569;
      flex-shrink: 0;
    }

    .status-bar.success {
      color: #16a34a;
      background-color: #f0fdf4;
      border-color: #86efac;
    }

    .status-bar.error {
      color: #dc2626;
      background-color: #fef2f2;
      border-color: #fca5a5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="editor-container">
      <div class="editor-panel">
        <div class="editor-label">输入 JSON</div>
        <textarea id="input" placeholder='在此输入 JSON，例如: {"name": "张三", "age": 25}'></textarea>
      </div>
      <div class="editor-panel">
        <div class="editor-label">输出结果</div>
        <textarea id="output" readonly placeholder="处理结果将显示在这里"></textarea>
      </div>
    </div>

    <div class="controls">
      <button class="btn-primary" onclick="formatJSON()">格式化</button>
      <button class="btn-secondary" onclick="minifyJSON()">压缩</button>
      <button class="btn-copy" onclick="copyToClipboard()">复制</button>

      <div class="options-wrapper">
        <div class="option-group">
          <label for="indent">缩进:</label>
          <select id="indent">
            <option value="2">2 空格</option>
            <option value="4">4 空格</option>
          </select>
        </div>

        <div class="option-group">
          <input type="checkbox" id="ignoreNull">
          <label for="ignoreNull">忽略 null 值</label>
        </div>
      </div>
    </div>

    <div class="status-bar" id="status">准备就绪</div>
  </div>

  <script>
    function parseAndProcess() {
      const input = document.getElementById('input').value.trim();
      if (!input) {
        showError('请输入 JSON 内容');
        return null;
      }

      try {
        return JSON.parse(input);
      } catch (e) {
        showError(`JSON 语法错误: ${e.message}`);
        return null;
      }
    }

    function filterNullValues(obj) {
      if (Array.isArray(obj)) {
        return obj.map(filterNullValues);
      }
      if (obj !== null && typeof obj === 'object') {
        const result = {};
        for (const [key, value] of Object.entries(obj)) {
          if (value !== null) {
            result[key] = filterNullValues(value);
          }
        }
        return result;
      }
      return obj;
    }

    function formatJSON() {
      const output = document.getElementById('output');
      const status = document.getElementById('status');
      const indent = parseInt(document.getElementById('indent').value, 10);
      const ignoreNull = document.getElementById('ignoreNull').checked;

      let obj = parseAndProcess();
      if (obj === null) return;

      if (ignoreNull) {
        obj = filterNullValues(obj);
      }

      try {
        output.value = JSON.stringify(obj, null, indent);
        showSuccess('格式化成功');
      } catch (e) {
        showError(`格式化失败: ${e.message}`);
      }
    }

    function minifyJSON() {
      const output = document.getElementById('output');
      const status = document.getElementById('status');
      const ignoreNull = document.getElementById('ignoreNull').checked;

      let obj = parseAndProcess();
      if (obj === null) return;

      if (ignoreNull) {
        obj = filterNullValues(obj);
      }

      try {
        output.value = JSON.stringify(obj);
        showSuccess('压缩成功');
      } catch (e) {
        showError(`压缩失败: ${e.message}`);
      }
    }

    function copyToClipboard() {
      const output = document.getElementById('output');
      const text = output.value;

      if (!text) {
        showError('没有内容可复制');
        return;
      }

      navigator.clipboard.writeText(text).then(() => {
        showSuccess('已复制到剪贴板');
      }).catch((err) => {
        // Fallback for older browsers
        output.select();
        document.execCommand('copy');
        showSuccess('已复制到剪贴板');
      });
    }

    function showError(message) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status-bar error';
    }

    function showSuccess(message) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status-bar success';
    }

    // Auto-format on paste
    document.getElementById('input').addEventListener('paste', (e) => {
      setTimeout(() => {
        formatJSON();
      }, 100);
    });
  </script>
</body>
</html>
